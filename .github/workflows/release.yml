name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. "1.2.3"). Leave empty for auto-detect.'
        required: false
        default: ''
        type: string
concurrency:
  group: create-release-pr
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Create an automatically versioned release PR
        if: inputs.version == ''
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main
          skip-github-release: true

      - name: Create a release PR for the requested version
        if: inputs.version != ''
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main
          skip-github-release: true
          release-as: ${{ inputs.version }}
