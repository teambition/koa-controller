name: Publish Release

on:
  pull_request:
    types: [closed]

concurrency:
  group: publish-release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/version-') &&
      contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Verify release PR version
        run: |
          version=$(node -p "require('./package.json').version")
          release_branch="${{ github.event.pull_request.head.ref }}"
          release_version="${release_branch#release/version-}"

          if [ "$version" != "$release_version" ]; then
            echo "Release PR branch $release_branch does not match package.json version $version."
            exit 1
          fi

      - name: Check whether this version is already published
        id: publish-check
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@tng/koa-controller@$version" version >/dev/null 2>&1; then
            echo "@tng/koa-controller@$version is already published."
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should-publish=true" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.publish-check.outputs.should-publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: steps.publish-check.outputs.should-publish == 'true'
        run: pnpm build

      - name: Verify package contents
        if: steps.publish-check.outputs.should-publish == 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.publish-check.outputs.should-publish == 'true'
        run: npm publish --access public --tag latest

      - name: Create tag and GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          notes_file="$RUNNER_TEMP/release-notes.md"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists."
          else
            git tag "$tag" "$GITHUB_SHA"
            git push origin "$tag"
          fi

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists."
            exit 0
          fi

          node .github/scripts/extract-release-notes.mjs "$version" "$notes_file"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes-file "$notes_file"
