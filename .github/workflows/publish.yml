name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Verify tag matches package version
        run: |
          version=$(node -p "require('./package.json').version")
          tag="${GITHUB_REF_NAME#v}"

          if [ "$version" != "$tag" ]; then
            echo "Tag v$tag does not match package.json version $version."
            exit 1
          fi

      - name: Check whether this version is already published
        id: publish-check
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@tng/koa-controller@$version" version >/dev/null 2>&1; then
            echo "@tng/koa-controller@$version is already published."
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should-publish=true" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.publish-check.outputs.should-publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: steps.publish-check.outputs.should-publish == 'true'
        run: pnpm build

      - name: Verify package contents
        if: steps.publish-check.outputs.should-publish == 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.publish-check.outputs.should-publish == 'true'
        run: npm publish --access public --tag latest

      - name: Create GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          notes_file="$RUNNER_TEMP/release-notes.md"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists."
            exit 0
          fi

          node .github/scripts/extract-release-notes.mjs "$version" "$notes_file"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes-file "$notes_file"
